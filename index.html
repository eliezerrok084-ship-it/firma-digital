<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Firma de Contrato - Inversiones ROCA</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    <style>
        body { font-family: 'Inter', sans-serif; background: #0f172a; color: #1e293b; display: flex; flex-direction: column; align-items: center; min-height: 100vh; margin: 0; padding: 10px; box-sizing: border-box; }
        .card { background: #ffffff; width: 100%; max-width: 450px; padding: 25px; box-shadow: 0 10px 25px rgba(0,0,0,0.5); border-radius: 4px; margin-bottom: 20px; box-sizing: border-box; }
        .header { text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 15px; }
        .header h2 { margin: 0; font-size: 22px; font-weight: 800; }
        .cuerpo { font-size: 14px; line-height: 1.5; text-align: justify; }
        canvas { border: 1px dashed #cbd5e1; border-radius: 8px; background: #fff; touch-action: none; width: 100%; height: 180px; display: block; margin: 15px 0; }
        .firma-linea { border-top: 1.5px solid #000; width: 80%; margin: 10px auto; padding-top: 5px; text-align: center; font-weight: bold; font-size: 13px; text-transform: uppercase; }
        .btn-group { width: 100%; max-width: 450px; display: flex; flex-direction: column; gap: 10px; padding-bottom: 30px; }
        button { border: none; padding: 16px; border-radius: 10px; font-weight: bold; cursor: pointer; font-size: 14px; }
        .btn-clear { background: #f1f5f9; color: #64748b; }
        .btn-download { background: #10b981; color: white; }
        .btn-send { background: #1e3a8a; color: white; }
    </style>
</head>
<body>

<div class="card" id="hoja-contrato">
    <div class="header">
        <h2>CONTRATO DE CRÉDITO</h2>
        <small>Documento Privado</small>
    </div>
    
    <div class="cuerpo">
        <b>Yo</b> <span id="nom-display"></span> con C.I.: <b id="ci-display"></b>, con domicilio en <b id="dir-display"></b>, 
        declaro haber recibido en préstamo la suma de <b id="cap-display"></b><br>
        <b>(SON:</b> <span id="literal-display"></span><b>)</b><br>
        Con un <b>Interés: (<span id="int-display"></span>%),</b> <span id="plazo-etiqueta"></span>.<br><br>
        
        <b>Cronograma:</b> <span id="n-display"></span> Cuotas de <span id="cf-display"></span><br>
        <b>Fecha Desembolso:</b> <span id="fdes-display"></span><br>
        <b>Fecha 1ra Cuota:</b> <span id="f1-display"></span><br><br>
        
        <b>Método:</b> <span id="metodo-display"></span> <span id="ref-display"></span>
    </div>

    <canvas id="canvas-firma"></canvas>

    <div class="firma-linea">
        <span id="footer-nom"></span><br>
        <small id="footer-ci"></small>
    </div>
</div>

<div class="btn-group">
    <button class="btn-clear" onclick="limpiar()">🔄 REPETIR TRAZO</button>
    <button class="btn-download" onclick="descargarPNG()">1. DESCARGAR CONTRATO (PNG)</button>
    <button class="btn-send" onclick="enviar()">2. ENVIAR A WHATSAPP</button>
</div>

<script>
    const canvas = document.getElementById('canvas-firma');
    const ctx = canvas.getContext('2d');
    let dibujando = false;

    // CAPTURA LOS DATOS DE LA URL
    const urlParams = new URLSearchParams(window.location.search);
    
    // Inyectar datos en el HTML
    document.getElementById('nom-display').innerText = urlParams.get('nom') || "";
    document.getElementById('ci-display').innerText = urlParams.get('ci') || "";
    document.getElementById('dir-display').innerText = urlParams.get('dir') || "NO ESPECIFICADA";
    document.getElementById('cap-display').innerText = (urlParams.get('mon') || "Bs.") + " " + (urlParams.get('cap') || "0.00");
    document.getElementById('literal-display').innerText = urlParams.get('lit') || "";
    document.getElementById('int-display').innerText = urlParams.get('int') || "0";
    document.getElementById('n-display').innerText = urlParams.get('n') || "0";
    document.getElementById('cf-display').innerText = (urlParams.get('mon') || "Bs.") + " " + (urlParams.get('cf') || "0.00");
    document.getElementById('fdes-display').innerText = urlParams.get('fD') || "";
    document.getElementById('f1-display').innerText = urlParams.get('f1') || "";
    document.getElementById('metodo-display').innerText = urlParams.get('met') || "";
    document.getElementById('ref-display').innerText = urlParams.get('ref') ? `(${urlParams.get('ref')})` : "";
    document.getElementById('footer-nom').innerText = urlParams.get('nom') || "";
    document.getElementById('footer-ci').innerText = "C.I.: " + (urlParams.get('ci') || "");

    // Lógica del Canvas (Firma)
    function ajustarCanvas() {
        const r = canvas.getBoundingClientRect();
        canvas.width = r.width * 2; canvas.height = r.height * 2;
        ctx.scale(2, 2); ctx.strokeStyle = "#1e3a8a"; ctx.lineWidth = 2;
    }
    window.onload = ajustarCanvas;

    function obtenerPos(e) {
        const r = canvas.getBoundingClientRect();
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: clientX - r.left, y: clientY - r.top };
    }
    function iniciar(e) { dibujando = true; ctx.beginPath(); const p = obtenerPos(e); ctx.moveTo(p.x, p.y); }
    function mover(e) { if (!dibujando) return; e.preventDefault(); const p = obtenerPos(e); ctx.lineTo(p.x, p.y); ctx.stroke(); }
    
    canvas.addEventListener('mousedown', iniciar);
    canvas.addEventListener('mousemove', mover);
    window.addEventListener('mouseup', () => dibujando = false);
    canvas.addEventListener('touchstart', iniciar);
    canvas.addEventListener('touchmove', mover);

    function limpiar() { ctx.clearRect(0, 0, canvas.width, canvas.height); }

    function descargarPNG() {
        html2canvas(document.getElementById('hoja-contrato'), { scale: 3 }).then(c => {
            const link = document.createElement('a');
            link.download = "Contrato_Firmado.png";
            link.href = c.toDataURL();
            link.click();
        });
    }

    function enviar() {
        const msg = encodeURIComponent("*CONTRATO FIRMADO*\nAdjunto el documento del cliente.");
        window.location.href = `https://wa.me/59175475544?text=${msg}`;
    }
</script>
</body>
</html>
